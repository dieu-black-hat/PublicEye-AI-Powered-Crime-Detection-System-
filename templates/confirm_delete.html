{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h4><i class="fas fa-trash"></i> Confirm Delete</h4>
                </div>
                <div class="card-body">
                    <p>Are you sure you want to delete this uploaded video?</p>
                    <p><strong>File:</strong> {{ upload.video_file.name }}</p>
                    <p><strong>Uploaded:</strong> {{ upload.uploaded_at|date:"Y-m-d H:i:s" }}</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Yes, Delete
                        </button>
                        <a href="{% url 'upload_video' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
